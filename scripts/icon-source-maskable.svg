<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Full-bleed background: no rounded corners so launchers (Android maskable,
       iOS apple-touch) can apply their own mask without exposing edges. -->
  <rect width="32" height="32" fill="#282828" />
  <!-- Thermometer scaled into the ~60% centre safe zone. -->
  <g transform="translate(16 16) scale(0.62) translate(-16 -16)">
    <!-- stem -->
    <rect x="13.5" y="6" width="5" height="15" rx="2.5" fill="#ebebe1" />
    <!-- bulb -->
    <circle cx="16" cy="23" r="5" fill="#ffdaea" />
    <!-- mercury -->
    <rect x="15" y="11" width="2" height="10" fill="#ffdaea" />
    <circle cx="16" cy="23" r="3" fill="#c0392b" />
  </g>
</svg>
